<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI聊天App管理后台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top left, #1a1a2e 0%, #0f1015 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
      /* Adding a starry background subtle pattern */
      background-image: radial-gradient(#ffffff1a 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .tab {
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.05);
      color: #94a3b8;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .tab.active {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(138, 43, 226, 0.1) 100%);
      color: #22d3ee;
      border-color: rgba(34, 211, 238, 0.4);
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.1);
    }

    .card {
      background: rgba(20, 22, 30, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(20px);
      display: none;
    }

    .card.active {
      display: block;
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card h2 {
      color: #f8fafc;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #94a3b8;
      font-size: 13px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(34, 211, 238, 0.5);
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.1);
    }

    select option {
      background: #1e293b;
      color: #fff;
    }

    button {
      padding: 14px 28px;
      background: linear-gradient(135deg, #0284c7 0%, #4f46e5 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
    }

    button.danger {
      background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
    }

    button.success {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      word-break: break-all;
      display: none;
      border: 1px solid transparent;
    }

    .result.show {
      display: block;
    }

    .result.success {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
      color: #34d399;
    }

    .result.error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      overflow: hidden;
    }

    th,
    td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }

    th {
      background: rgba(255, 255, 255, 0.03);
      color: #cbd5e1;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    td {
      color: #94a3b8;
    }

    code {
      background: rgba(0, 0, 0, 0.4);
      padding: 4px 8px;
      border-radius: 6px;
      color: #38bdf8;
      font-family: monospace;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .tag-vip {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .tag-free {
      background: rgba(148, 163, 184, 0.1);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .tag-used {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .tag-unused {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-item {
      text-align: center;
      padding: 24px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.3s;
    }

    .stat-item:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.02);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #38bdf8;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row>* {
      flex: 1;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🎭 AI聊天App管理后台</h1>

    <div class="tabs">
      <button class="tab active" onclick="showTab('stats')">📊 数据统计</button>
      <button class="tab" onclick="showTab('cards')">🎫 卡密管理</button>
      <button class="tab" onclick="showTab('users')">👥 用户列表</button>
      <button class="tab" onclick="showTab('characters')">🎨 角色管理</button>
    </div>

    <!-- 数据统计 -->
    <div id="stats" class="card active">
      <h2>📊 数据统计</h2>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="totalCards">-</div>
          <div class="stat-label">总卡密数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="usedCards">-</div>
          <div class="stat-label">已使用</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="totalUsers">-</div>
          <div class="stat-label">用户数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="vipUsers">-</div>
          <div class="stat-label">VIP用户</div>
        </div>
      </div>
      <button onclick="loadStats()">🔄 刷新统计</button>
    </div>

    <!-- 卡密管理 -->
    <div id="cards" class="card">
      <h2>🎫 生成卡密</h2>
      <div class="row">
        <div class="form-group">
          <label>卡密类型</label>
          <select id="cardType">
            <option value="nb001">nb001 - 3天VIP</option>
            <option value="nb002">nb002 - 7天VIP</option>
            <option value="nb003">nb003 - 30天VIP</option>
          </select>
        </div>
        <div class="form-group">
          <label>生成数量</label>
          <input type="number" id="cardCount" value="5" min="1" max="50">
        </div>
      </div>
      <div class="form-group">
        <label>管理员密钥</label>
        <input type="password" id="adminKey" value="admin_secret_key">
      </div>
      <button onclick="generateCards()">生成卡密</button>
      <div id="generateResult" class="result"></div>

      <h2 style="margin-top: 24px;">📋 卡密使用记录</h2>
      <table>
        <thead>
          <tr>
            <th>卡密</th>
            <th>类型</th>
            <th>状态</th>
            <th>使用者</th>
            <th>使用时间</th>
          </tr>
        </thead>
        <tbody id="cardTable"></tbody>
      </table>
    </div>

    <!-- 用户列表 -->
    <div id="users" class="card">
      <h2>👥 用户列表</h2>
      <table>
        <thead>
          <tr>
            <th>设备ID</th>
            <th>免费次数</th>
            <th>VIP状态</th>
            <th>VIP到期时间</th>
            <th>注册时间</th>
          </tr>
        </thead>
        <tbody id="userTable"></tbody>
      </table>
    </div>

    <!-- 角色管理 -->
    <div id="characters" class="card">
      <h2>🎨 角色列表</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>名称</th>
            <th>描述</th>
            <th>头像</th>
          </tr>
        </thead>
        <tbody id="characterTable"></tbody>
      </table>

      <h2 style="margin-top: 24px;">➕ 添加新角色</h2>
      <div class="form-group">
        <label>角色ID（英文唯一标识）</label>
        <input type="text" id="newCharId" placeholder="如: loli">
      </div>
      <div class="form-group">
        <label>角色名称</label>
        <input type="text" id="newCharName" placeholder="如: 小可爱">
      </div>
      <div class="form-group">
        <label>角色描述</label>
        <input type="text" id="newCharDesc" placeholder="如: 萌萌的小可爱">
      </div>
      <div class="form-group">
        <label>头像URL</label>
        <input type="text" id="newCharAvatar" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>系统提示词</label>
        <textarea id="newCharPrompt" rows="4" style="width:100%;padding:12px;border:2px solid #eee;border-radius:8px;"
          placeholder="请描述角色的性格、说话方式等..."></textarea>
      </div>
      <button onclick="addCharacter()" class="success">添加角色</button>
      <div id="charResult" class="result"></div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    function showTab(tabId) {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');

      if (tabId === 'stats') loadStats();
      if (tabId === 'cards') loadCards();
      if (tabId === 'users') loadUsers();
      if (tabId === 'characters') loadCharacters();
    }

    async function loadStats() {
      const adminKey = document.getElementById('adminKey') ? document.getElementById('adminKey').value : 'admin_secret_key';
      try {
        const [cardsRes, usersRes] = await Promise.all([
          fetch(`${API_BASE}/card/all?admin_key=${adminKey}`),
          fetch(`${API_BASE}/user/all?admin_key=${adminKey}`)
        ]);

        const cardsData = await cardsRes.json();
        const usersData = await usersRes.json();

        if (cardsData.success) {
          const cards = cardsData.data || [];
          document.getElementById('totalCards').textContent = cards.length;
          document.getElementById('usedCards').textContent = cards.filter(c => c.used_by).length;
        }

        if (usersData.success) {
          const users = usersData.data || [];
          document.getElementById('totalUsers').textContent = users.length;
          const vipCount = users.filter(u => u.vip_expire_time && new Date(u.vip_expire_time) > new Date()).length;
          document.getElementById('vipUsers').textContent = vipCount;
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function generateCards() {
      const cardType = document.getElementById('cardType').value;
      const count = parseInt(document.getElementById('cardCount').value);
      const adminKey = document.getElementById('adminKey').value;
      const resultDiv = document.getElementById('generateResult');

      try {
        const response = await fetch(`${API_BASE}/card/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ card_type: cardType, count, admin_key: adminKey })
        });
        const data = await response.json();

        if (data.success) {
          resultDiv.className = 'result show success';
          resultDiv.innerHTML = `<strong>成功！</strong> 生成了 ${count} 个卡密`;
          loadCards();
          loadStats();
        } else {
          resultDiv.className = 'result show error';
          resultDiv.innerHTML = `<strong>失败：</strong> ${data.message}`;
        }
      } catch (e) {
        resultDiv.className = 'result show error';
        resultDiv.innerHTML = `<strong>错误：</strong> ${e.message}`;
      }
    }

    async function loadCards() {
      const adminKey = document.getElementById('adminKey') ? document.getElementById('adminKey').value : 'admin_secret_key';
      const tbody = document.getElementById('cardTable');
      tbody.innerHTML = '<tr><td colspan="5">加载中...</td></tr>';

      try {
        const response = await fetch(`${API_BASE}/card/all?admin_key=${adminKey}`);
        const data = await response.json();

        if (data.success && data.data) {
          tbody.innerHTML = data.data.map(c => `
            <tr>
              <td><code>${c.card_key}</code></td>
              <td>${c.card_type}</td>
              <td><span class="tag ${c.used_by ? 'tag-used' : 'tag-unused'}">${c.used_by ? '已使用' : '未使用'}</span></td>
              <td>${c.used_by || '-'}</td>
              <td>${c.used_at || '-'}</td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
        }
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5">错误: ${e.message}</td></tr>`;
      }
    }

    async function loadUsers() {
      const adminKey = document.getElementById('adminKey') ? document.getElementById('adminKey').value : 'admin_secret_key';
      const tbody = document.getElementById('userTable');
      tbody.innerHTML = '<tr><td colspan="5">加载中...</td></tr>';

      try {
        const response = await fetch(`${API_BASE}/user/all?admin_key=${adminKey}`);
        const data = await response.json();

        if (data.success && data.data) {
          tbody.innerHTML = data.data.map(u => {
            const isVip = u.vip_expire_time && new Date(u.vip_expire_time) > new Date();
            return `
              <tr>
                <td><code>${u.device_id.substring(0, 20)}...</code></td>
                <td>${u.free_chats}</td>
                <td><span class="tag ${isVip ? 'tag-vip' : 'tag-free'}">${isVip ? 'VIP' : '免费'}</span></td>
                <td>${u.vip_expire_time ? u.vip_expire_time.substring(0, 19) : '-'}</td>
                <td>${u.created_at ? u.created_at.substring(0, 19) : '-'}</td>
              </tr>
            `;
          }).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
        }
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5">错误: ${e.message}</td></tr>`;
      }
    }

    async function loadCharacters() {
      const tbody = document.getElementById('characterTable');
      tbody.innerHTML = '<tr><td colspan="4">加载中...</td></tr>';

      try {
        // Characters list is usually public but we keep it safe
        const response = await fetch(`${API_BASE}/characters`);
        const data = await response.json();

        if (data.success && data.data) {
          tbody.innerHTML = data.data.map(c => `
            <tr>
              <td><code>${c.id}</code></td>
              <td>${c.name}</td>
              <td>${c.description || '-'}</td>
              <td><img src="${c.avatar}" width="40" height="40" style="border-radius:50%;"></td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="4">暂无数据</td></tr>';
        }
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="4">错误: ${e.message}</td></tr>`;
      }
    }

    async function addCharacter() {
      const id = document.getElementById('newCharId').value.trim();
      const name = document.getElementById('newCharName').value.trim();
      const desc = document.getElementById('newCharDesc').value.trim();
      const avatar = document.getElementById('newCharAvatar').value.trim();
      const prompt = document.getElementById('newCharPrompt').value.trim();
      const resultDiv = document.getElementById('charResult');

      if (!id || !name || !prompt) {
        resultDiv.className = 'result show error';
        resultDiv.innerHTML = '请填写必填字段（ID、名称、提示词）';
        return;
      }

      try {
        const adminKey = document.getElementById('adminKey') ? document.getElementById('adminKey').value : 'admin_secret_key';
        const response = await fetch(`${API_BASE}/character/add?admin_key=${adminKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            id, name, description: desc, avatar: avatar || 'https://api.dicebear.com/9.x/avataaars/png?seed=' + id, system_prompt: prompt
          })
        });
        const data = await response.json();

        if (data.success) {
          resultDiv.className = 'result show success';
          resultDiv.innerHTML = '角色添加成功！';
          loadCharacters();
          // 清空表单
          document.getElementById('newCharId').value = '';
          document.getElementById('newCharName').value = '';
          document.getElementById('newCharDesc').value = '';
          document.getElementById('newCharAvatar').value = '';
          document.getElementById('newCharPrompt').value = '';
        } else {
          resultDiv.className = 'result show error';
          resultDiv.innerHTML = `失败：${data.message}`;
        }
      } catch (e) {
        resultDiv.className = 'result show error';
        resultDiv.innerHTML = `错误：${e.message}`;
      }
    }

    loadStats();
  </script>
</body>

</html>
