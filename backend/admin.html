<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI聊天App管理后台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top left, #1a1a2e 0%, #0f1015 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
      /* Adding a starry background subtle pattern */
      background-image: radial-gradient(#ffffff1a 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
      font-size: 28px;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .tab {
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.05);
      color: #94a3b8;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .tab.active {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.1) 0%, rgba(138, 43, 226, 0.1) 100%);
      color: #22d3ee;
      border-color: rgba(34, 211, 238, 0.4);
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.1);
    }

    .card {
      background: rgba(20, 22, 30, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(20px);
      display: none;
    }

    .card.active {
      display: block;
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card h2 {
      color: #f8fafc;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #94a3b8;
      font-size: 13px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(34, 211, 238, 0.5);
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.1);
    }

    select option {
      background: #1e293b;
      color: #fff;
    }

    button {
      padding: 14px 28px;
      background: linear-gradient(135deg, #0284c7 0%, #4f46e5 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
    }

    button.danger {
      background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
    }

    button.success {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
    }

    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      word-break: break-all;
      display: none;
      border: 1px solid transparent;
    }

    .result.show {
      display: block;
    }

    .result.success {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.3);
      color: #34d399;
    }

    .result.error {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #f87171;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      overflow: hidden;
    }

    th,
    td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
    }

    th {
      background: rgba(255, 255, 255, 0.03);
      color: #cbd5e1;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    td {
      color: #94a3b8;
    }

    code {
      background: rgba(0, 0, 0, 0.4);
      padding: 4px 8px;
      border-radius: 6px;
      color: #38bdf8;
      font-family: monospace;
    }

    .tag {
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .tag-vip {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .tag-free {
      background: rgba(148, 163, 184, 0.1);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .tag-used {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .tag-unused {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-item {
      text-align: center;
      padding: 24px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.3s;
    }

    .stat-item:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.02);
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #38bdf8;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row>* {
      flex: 1;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
    }

    .modal-content {
      background: #1e293b;
      margin: 2% auto;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      width: 90%;
      max-width: 900px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .modal-header {
      padding: 20px 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
    }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #0f172a;
    }

    .close {
      color: #94a3b8;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s;
    }

    .close:hover {
      color: #ff4d4d;
    }

    .chat-log-item {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }

    .chat-bubble {
      max-width: 85%;
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      position: relative;
    }

    .chat-bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .chat-bubble.assistant {
      align-self: flex-start;
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 4px;
    }

    .chat-info {
      font-size: 11px;
      color: #64748b;
      margin-top: 5px;
      display: flex;
      gap: 10px;
    }

    .assistant .chat-info {
      justify-content: flex-start;
    }

    .user .chat-info {
      justify-content: flex-end;
    }

    .char-badge {
      color: #22d3ee;
      font-weight: bold;
    }

    .btn-log {
      padding: 6px 12px;
      font-size: 12px;
      background: rgba(34, 211, 238, 0.1);
      color: #22d3ee;
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-log:hover {
      background: rgba(34, 211, 238, 0.2);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🎭 AI聊天App管理后台</h1>

    <div class="card active"
      style="padding: 15px; margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 20px;">
      <div style="flex: 1; display: flex; align-items: center; gap: 10px;">
        <span style="color: #94a3b8; font-size: 13px; white-space: nowrap;">🔑 管理员密钥:</span>
        <input type="password" id="globalAdminKey" value="admin_secret_key"
          style="padding: 8px 12px; height: 36px; max-width: 300px;">
      </div>
      <div style="font-size: 12px; color: #64748b;">(用于授权所有写操作)</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('stats', this)">📊 数据统计</button>
      <button class="tab" onclick="showTab('cards', this)">🎫 卡密管理</button>
      <button class="tab" onclick="showTab('users', this)">👥 用户列表</button>
      <button class="tab" onclick="showTab('characters', this)">🎨 角色管理</button>
    </div>

    <!-- 数据统计 -->
    <div id="stats" class="card active">
      <h2>📊 数据统计</h2>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="totalCards">-</div>
          <div class="stat-label">总卡密数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="usedCards">-</div>
          <div class="stat-label">已使用</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="totalUsers">-</div>
          <div class="stat-label">用户数</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="vipUsers">-</div>
          <div class="stat-label">VIP用户</div>
        </div>
      </div>
      <button onclick="loadStats()">🔄 刷新统计</button>
    </div>

    <!-- 卡密管理 -->
    <div id="cards" class="card">
      <h2>🎫 生成卡密</h2>
      <div class="row">
        <div class="form-group">
          <label>卡密类型</label>
          <select id="cardType">
            <option value="nb001">nb001 - 3天VIP</option>
            <option value="nb002">nb002 - 7天VIP</option>
            <option value="nb003">nb003 - 30天VIP</option>
          </select>
        </div>
        <div class="form-group">
          <label>生成数量</label>
          <input type="number" id="cardCount" value="5" min="1" max="50">
        </div>
      </div>
      <button onclick="generateCards()">⚡ 批量生成</button>
      <div id="generateResult" class="result"></div>

      <h2 style="margin-top: 24px;">📋 卡密使用记录</h2>
      <table>
        <thead>
          <tr>
            <th>卡密</th>
            <th>类型</th>
            <th>状态</th>
            <th>使用者</th>
            <th>使用时间</th>
          </tr>
        </thead>
        <tbody id="cardTable"></tbody>
      </table>
    </div>

    <!-- 用户列表 -->
    <div id="users" class="card">
      <h2>👥 用户列表</h2>
      <table>
        <thead>
          <tr>
            <th>设备ID</th>
            <th>免费次数</th>
            <th>VIP状态</th>
            <th>VIP到期时间</th>
            <th>注册时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="userTable"></tbody>
      </table>
    </div>

    <!-- 角色管理 -->
    <div id="characters" class="card">
      <h2>🎨 角色列表</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>名称</th>
            <th>描述</th>
            <th>头像</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="characterTable"></tbody>
      </table>

      <h2 style="margin-top: 24px;">➕ 添加新角色</h2>
      <div class="form-group">
        <label>角色ID（英文唯一标识）</label>
        <input type="text" id="newCharId" placeholder="如: loli">
      </div>
      <div class="form-group">
        <label>角色名称</label>
        <input type="text" id="newCharName" placeholder="如: 小可爱">
      </div>
      <div class="form-group">
        <label>角色描述</label>
        <input type="text" id="newCharDesc" placeholder="如: 萌萌的小可爱">
      </div>
      <div class="form-group">
        <label>头像URL</label>
        <input type="text" id="newCharAvatar" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>系统提示词</label>
        <textarea id="newCharPrompt" rows="4" style="width:100%;padding:12px;border:2px solid #eee;border-radius:8px;"
          placeholder="请描述角色的性格、说话方式等..."></textarea>
      </div>
      <button onclick="addCharacter()" class="success">添加角色</button>
      <div id="charResult" class="result"></div>
    </div>
  </div>

  <!-- 聊天记录弹窗 -->
  <div id="logModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="logModalTitle" style="margin:0; font-size:18px;">对话日志</h2>
        <span class="close" onclick="closeLogs()">&times;</span>
      </div>
      <div id="logBody" class="modal-body">
        <!-- 内容由JS填充 -->
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    // 格式化时间：将 SQLite 的 UTC 时间转换为本地浏览器时间 (如北京时间 +8)
    function formatDate(dateStr) {
      if (!dateStr || dateStr === '-') return '-';
      try {
        // SQLite 的格式是 "2026-03-07 08:00:00"，我们需要将其转为 "2026-03-07T08:00:00Z" 强制浏览器识别为 UTC
        const isoStr = dateStr.replace(' ', 'T') + 'Z';
        const date = new Date(isoStr);
        // 如果转换失败返回原始字符串
        if (isNaN(date.getTime())) return dateStr;
        return date.toLocaleString('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        });
      } catch (e) {
        return dateStr;
      }
    }

    function showTab(tabId, el) {
      document.querySelectorAll('.card').forEach(c => { if (c.id !== "globalAuth") c.classList.remove('active') });
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      if (el) el.classList.add('active');

      if (tabId === 'stats') loadStats();
      if (tabId === 'cards') loadCards();
      if (tabId === 'users') loadUsers();
      if (tabId === 'characters') loadCharacters();
    }

    async function loadStats() {
      const adminKey = document.getElementById('globalAdminKey').value;
      try {
        const [cardsRes, usersRes] = await Promise.all([
          fetch(`${API_BASE}/card/all?admin_key=${adminKey}`),
          fetch(`${API_BASE}/user/all?admin_key=${adminKey}`)
        ]);

        const cardsData = await cardsRes.json();
        const usersData = await usersRes.json();

        if (cardsData.success) {
          const cards = cardsData.data || [];
          document.getElementById('totalCards').textContent = cards.length;
          document.getElementById('usedCards').textContent = cards.filter(c => c.used_by).length;
        }

        if (usersData.success) {
          const users = usersData.data || [];
          document.getElementById('totalUsers').textContent = users.length;
          const vipCount = users.filter(u => u.vip_expire_time && new Date(u.vip_expire_time) > new Date()).length;
          document.getElementById('vipUsers').textContent = vipCount;
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function generateCards() {
      const cardType = document.getElementById('cardType').value;
      const count = parseInt(document.getElementById('cardCount').value);
      const adminKey = document.getElementById('globalAdminKey').value;
      const resultDiv = document.getElementById('generateResult');

      try {
        const response = await fetch(`${API_BASE}/card/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ card_type: cardType, count, admin_key: adminKey })
        });
        const data = await response.json();

        if (data.success) {
          resultDiv.className = 'result show success';
          resultDiv.innerHTML = `<strong>成功！</strong> 生成了 ${count} 个卡密`;
          loadCards();
          loadStats();
        } else {
          resultDiv.className = 'result show error';
          resultDiv.innerHTML = `<strong>失败：</strong> ${data.message}`;
        }
      } catch (e) {
        resultDiv.className = 'result show error';
        resultDiv.innerHTML = `<strong>错误：</strong> ${e.message}`;
      }
    }

    async function loadCards() {
      const adminKey = document.getElementById('globalAdminKey').value;
      const tbody = document.getElementById('cardTable');
      tbody.innerHTML = '<tr><td colspan="5">加载中...</td></tr>';

      try {
        const response = await fetch(`${API_BASE}/card/all?admin_key=${adminKey}`);
        const data = await response.json();

        if (data.success && data.data) {
          tbody.innerHTML = data.data.map(c => `
            <tr>
              <td><code>${c.card_key}</code></td>
              <td>${c.card_type}</td>
              <td><span class="tag ${c.used_by ? 'tag-used' : 'tag-unused'}">${c.used_by ? '已使用' : '未使用'}</span></td>
              <td>${c.used_by || '-'}</td>
              <td>${formatDate(c.used_at)}</td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
        }
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5">错误: ${e.message}</td></tr>`;
      }
    }

    async function loadUsers() {
      const adminKey = document.getElementById('globalAdminKey').value;
      const tbody = document.getElementById('userTable');
      tbody.innerHTML = '<tr><td colspan="5">加载中...</td></tr>';

      try {
        const response = await fetch(`${API_BASE}/user/all?admin_key=${adminKey}`);
        const data = await response.json();

        if (data.success && data.data) {
          tbody.innerHTML = data.data.map(u => {
            const isVip = u.vip_expire_time && new Date(u.vip_expire_time) > new Date();
            return `
              <tr>
                <td><code>${u.device_id.substring(0, 20)}...</code></td>
                <td>${u.free_chats}</td>
                <td><span class="tag ${isVip ? 'tag-vip' : 'tag-free'}">${isVip ? 'VIP' : '免费'}</span></td>
                <td>${formatDate(u.vip_expire_time)}</td>
                <td>${formatDate(u.created_at)}</td>
                <td>
                  <button class="btn-log" onclick="viewChatLogs('${u.device_id}')">日志</button>
                </td>
              </tr>
            `;
          }).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
        }
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5">错误: ${e.message}</td></tr>`;
      }
    }

    async function loadCharacters() {
      const tbody = document.getElementById('characterTable');
      tbody.innerHTML = '<tr><td colspan="4">加载中...</td></tr>';

      try {
        // Characters list is usually public but we keep it safe
        const response = await fetch(`${API_BASE}/characters`);
        const data = await response.json();

        if (data.success && data.data) {
          tbody.innerHTML = data.data.map(c => `
            <tr>
              <td><code>${c.id}</code></td>
              <td>${c.name}</td>
              <td>${c.description || '-'}</td>
              <td><img src="${c.avatar}" width="40" height="40" style="border-radius:50%; object-fit: cover;"></td>
            <td><button class="danger" style="padding: 4px 10px; font-size: 11px;" onclick="deleteCharacter('${c.id}')">删除</button></td>
          </tr>
        `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="5">暂无数据</td></tr>';
        }
      } catch (e) {
        tbody.innerHTML = `<tr><td colspan="5">错误: ${e.message}</td></tr>`;
      }
    }

    async function deleteCharacter(id) {
      if (!confirm(`确定要删除角色 ${id} 吗？此操作不可逆！`)) return;
      const adminKey = document.getElementById('globalAdminKey').value;
      try {
        const res = await fetch(`${API_BASE}/character/${id}?admin_key=${adminKey}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          alert('删除成功');
          loadCharacters();
        } else {
          alert('删除失败: ' + data.message);
        }
      } catch (e) {
        alert('异常: ' + e.message);
      }
    }

    async function addCharacter() {
      const id = document.getElementById('newCharId').value.trim();
      const name = document.getElementById('newCharName').value.trim();
      const desc = document.getElementById('newCharDesc').value.trim();
      const avatar = document.getElementById('newCharAvatar').value.trim();
      const prompt = document.getElementById('newCharPrompt').value.trim();
      const resultDiv = document.getElementById('charResult');

      if (!id || !name || !prompt) {
        resultDiv.className = 'result show error';
        resultDiv.innerHTML = '请填写必填字段（ID、名称、提示词）';
        return;
      }

      try {
        const adminKey = document.getElementById('globalAdminKey').value;
        const response = await fetch(`${API_BASE}/character/add?admin_key=${adminKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            id, name, description: desc, avatar: avatar || 'https://api.dicebear.com/9.x/avataaars/png?seed=' + id, system_prompt: prompt
          })
        });
        const data = await response.json();

        if (data.success) {
          resultDiv.className = 'result show success';
          resultDiv.innerHTML = '角色添加成功！';
          loadCharacters();
          // 清空表单
          document.getElementById('newCharId').value = '';
          document.getElementById('newCharName').value = '';
          document.getElementById('newCharDesc').value = '';
          document.getElementById('newCharAvatar').value = '';
          document.getElementById('newCharPrompt').value = '';
        } else {
          resultDiv.className = 'result show error';
          resultDiv.innerHTML = `失败：${data.message}`;
        }
      } catch (e) {
        resultDiv.className = 'result show error';
        resultDiv.innerHTML = `错误：${e.message}`;
      }
    }

    async function viewChatLogs(deviceId) {
      const adminKey = document.getElementById('globalAdminKey').value;
      if (!adminKey) {
        alert('请在顶部输入管理员密钥');
        return;
      }

      const logModal = document.getElementById('logModal');
      const logBody = document.getElementById('logBody');
      const logTitle = document.getElementById('logModalTitle');

      logTitle.innerText = `星河档案: ${deviceId.substring(0, 12)}...`;
      logBody.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8;">✨ 正在开启记忆之门...</div>';
      logModal.style.display = 'block';

      try {
        const response = await fetch(`${API_BASE}/user/chat_logs/${deviceId}?admin_key=${adminKey}`);
        const result = await response.json();

        if (result.success) {
          if (result.data.length === 0) {
            logBody.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8;">🌌 此处尚无星光记忆 (暂无对话)</div>';
            return;
          }

          logBody.innerHTML = '';
          // 数据库查出来是最新的在前，反转显示
          const history = [...result.data].reverse();

          history.forEach(log => {
            const item = document.createElement('div');
            item.className = `chat-log-item`;

            const time = formatDate(log.created_at);
            const charInfo = log.role === 'assistant' ? `<span class="char-badge">@${log.character_id}</span>` : '<strong>你</strong>';

            item.innerHTML = `
              <div class="chat-bubble ${log.role}">
                ${log.content.replace(/\n/g, '<br>')}
              </div>
              <div class="chat-info ${log.role}">
                ${charInfo} • ${time}
              </div>
            `;
            logBody.appendChild(item);
          });

          // 自动滚动到底部
          setTimeout(() => {
            logBody.scrollTop = logBody.scrollHeight;
          }, 100);

        } else {
          logBody.innerHTML = `<div style="color:#f87171; text-align:center; padding:40px;">⚠️ 读取失败: ${result.message}</div>`;
        }
      } catch (e) {
        logBody.innerHTML = `<div style="color:#f87171; text-align:center; padding:40px;">⚠️ 系统异常: ${e.message}</div>`;
      }
    }

    function closeLogs() {
      document.getElementById('logModal').style.display = 'none';
    }

    window.onclick = function (event) {
      const modal = document.getElementById('logModal');
      if (event.target == modal) {
        closeLogs();
      }
    }

    loadStats();
  </script>
</body>

</html>
