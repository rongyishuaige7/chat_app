name: chat_app
description: "解忧聊天 - AI角色扮演陪伴App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  provider: ^6.1.1
  shared_preferences: ^2.5.4
  uuid: ^4.2.1
  cached_network_image: ^3.4.1
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # The following section is specific to Flutter packages.
  assets:
    - assets/images/bg.png
    - assets/images/chat_bg.png
    - assets/images/logo.jpg
    - assets/images/avatar_siye.png
    - assets/images/avatar_zhimeng.png
    - assets/images/avatar_duya.png
    - assets/images/avatar_xiyin.png
    - assets/images/avatar_amber.png
