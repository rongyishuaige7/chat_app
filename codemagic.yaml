workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    ios_code_signing:
      distribution_type: ad_hoc
      signing_method: automatic
    scripts:
      - name: Get Flutter dependencies
        script: |
          flutter packages pub get
      - name: Build iOS for device
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/**/*.app
      - build/ios/**/*.ipa
